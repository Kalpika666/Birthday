<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NetroX - Google Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>NETROX</h1>
        <p>Sign in with your Google Account</p>
        
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <script>
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        }

        function handleCredentialResponse(response) {
            // Google එකෙන් එවන දත්ත කියවීම
            const responsePayload = decodeJwtResponse(response.credential);

            const userData = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture,
                isLoggedIn: true
            };

            // දත්ත Storage එකේ තැන්පත් කිරීම
            localStorage.setItem('netrox_user', JSON.stringify(userData));
            
            // Dashboard එකට යැවීම
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
