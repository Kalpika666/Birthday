<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetroX - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-purple: #c026d3;
            --accent-blue: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        h1 {
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        p {
            color: var(--text-muted);
            margin: 15px 0 35px 0;
            font-size: 0.95rem;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s ease;
            text-decoration: none;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .google-icon-wrapper {
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        footer {
            margin-top: 45px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        
        b { color: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-infinity"></i></div>
        <h1>NETROX</h1>
        <p>Welcome to the future of VPN management</p>

        <a href="index.html" class="btn-google">
            <div class="google-icon-wrapper">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Color_Icon.svg" width="16" alt="G">
            </div>
            Sign in with Google
        </a>

        <footer>
            © 2026 <b>NETROX</b>, All Rights Reserved.<br>
            Designed & Developed By <b>Kalpika™</b>
        </footer>
    </div>

</body>
</html>
